name: BudgetControl
options:
  bundleIdPrefix: com.danielsanchez
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: en
targets:
  BudgetControl:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BudgetControl
    info:
      path: BudgetControl/Info.plist
      properties:
        CFBundleDisplayName: Budget Control
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielsanchez.budgetcontrol
        PRODUCT_NAME: Budget Control
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_EMIT_LOC_STRINGS: YES

schemes:
  BudgetControl:
    build:
      targets:
        BudgetControl: all
    run:
      config: Debug
    archive:
      config: Release
